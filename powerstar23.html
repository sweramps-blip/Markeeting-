
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Page</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#000;
}

/* ========= Ad Overlay ========= */
#adOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    z-index:9999;
}

#adOverlay iframe{
    width:100%;
    height:100%;
    border:none;
}

/* Timer / Close Button */
#closeBtn{
    position:absolute;
    top:20px;
    right:25px;
    background:red;
    color:white;
    padding:18px 35px;
    border-radius:10px;
    font-weight:bold;
    font-size:20px;
    display:none;              /* 👈 start me hidden */
    cursor:not-allowed;
    z-index:10000;
}

/* ========= YouTube Center ========= */
#videoSection{
    display:none;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.video-container{
    width:90%;
    max-width:900px;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<!-- Ad Section -->
<div id="adOverlay">
    <div id="closeBtn">Wait 30s</div>
    <iframe src="https://www.effectivegatecpm.com/upkwe9r2?key=75595a960030d604a751407ff4d7266b"></iframe>
</div>

<!-- YouTube Section -->
<div id="videoSection">
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/8gW6Td2384M" allowfullscreen></iframe>
    </div>
</div>

<script>
/* ===== Step 1: 30s NO TIMER (Ad compulsory) ===== */
setTimeout(function(){

    let seconds = 30;
    let closeBtn = document.getElementById("closeBtn");
    closeBtn.style.display = "block";   // timer ab show hoga
    closeBtn.innerHTML = "Wait " + seconds + "s";

    /* ===== Step 2: 30s TIMER START ===== */
    let timer = setInterval(function(){
        seconds--;
        closeBtn.innerHTML = "Wait " + seconds + "s";

        if(seconds <= 0){
            clearInterval(timer);
            closeBtn.innerHTML = "❌ Close Ad";
            closeBtn.style.cursor = "pointer";

            closeBtn.onclick = function(){
                document.getElementById("adOverlay").style.display = "none";
                document.getElementById("videoSection").style.display = "flex";
            }
        }
    },1000);

}, 30000); // 👈 pehle 30 second kuch bhi show nahi hoga
</script>

</body>
</html>
