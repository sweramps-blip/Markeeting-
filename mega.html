<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://pl28713490.effectivegatecpm.com/50/e5/57/50e557cf9cc1005d7bf547336eed1e00.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Power Star | Final Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #000; --accent: #f59e0b; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Outfit'; margin: 0; text-align: center; overflow: hidden; user-select: none; touch-action: none; }
        #loader { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; }
        .stats-header { display: flex; justify-content: space-around; padding: 15px; background: #050505; border-bottom: 1px solid #222; }
        .stat-value { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        .board-container { background: #111; padding: 10px; border-radius: 15px; border: 1px solid #333; display: inline-block; margin-top: 15px; width: 95vw; max-width: 400px; }
        #grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; touch-action: none; position: relative; }
        .cell { aspect-ratio: 1; background: #151515; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: 800; border: 1px solid #222; font-size: 18px; color: #555; pointer-events: none; }
        .cell.active { background: var(--accent) !important; color: #000 !important; }
        .cell.found { background: #064e3b !important; color: var(--success) !important; }
        .hints-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; max-width: 400px; margin: 0 auto; }
        .hint-tag { background: #0f0c05; border: 1px solid #2b220a; color: #555; padding: 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .hint-tag.done { color: var(--success); background: #061a0e; text-decoration: line-through; border-color: var(--success); }
        .btn-main { width: 90%; padding: 18px; border-radius: 20px; border: none; background: var(--accent); font-weight: 800; font-size: 16px; margin-top: 15px; color:#000; }
    </style>
</head>
<body>

<div id="loader"><h2>POWER STAR</h2><p>Establishing Secure Sync...</p></div>

<div id="dashS" style="display:none;">
    <div class="stats-header">
        <div><small style="color:gray">COINS</small><span id="balance" class="stat-value">0</span></div>
        <div><small style="color:gray">LEVEL</small><span id="levelDisplay" class="stat-value">1</span></div>
        <div><small style="color:gray">TEAM COMM</small><span id="teamCommission" class="stat-value">0</span></div>
    </div>
    <div class="board-container">
        <div id="grid" onpointerdown="startS(event)" onpointermove="moveS(event)" onpointerup="endS()"></div>
    </div>
    <div class="hints-grid" id="hintsList"></div>
    <button class="btn-main" onclick="handleAd()">Claim Bonus Coins</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6qpU1imi9WDIY2Cm3KN4XLz0E6iR2li7CJWBzqIjKJyFtXZ7StDKGnbv4GeTwcp9P/exec";
    const AD_LINK = "https://www.effectivegatecpm.com/upkwe9r2?key=75595a960030d604a751407ff4d7266b";

    let u = { id: localStorage.getItem('sm_id') };
    let currentLevelWords = [], isSelecting = false, selectedCells = [], foundWords = [];
    let balance = 0, currentLevel = 1, teamComm = 0;

    window.onload = () => { if(!u.id) showLogin(); else verify(); };

    function showLogin() {
        document.getElementById("loader").style.display="none";
        Swal.fire({ title: 'Enter ID', input: 'text', background: '#121212', color: '#fff', confirmButtonColor: '#f59e0b', allowOutsideClick: false })
        .then(res => { if(res.value) { u.id = res.value.toUpperCase(); verify(); } });
    }

    async function verify() {
        try {
            const r = await fetch(SCRIPT_URL + "?action=checkID&id=" + u.id);
            const res = await r.json();
            if(res.status === "Approved") {
                localStorage.setItem('sm_id', u.id);
                balance = parseInt(res.balance) || 0;
                currentLevel = parseInt(res.level) || 1;
                teamComm = parseInt(res.teamCommission) || 0;
                document.getElementById("loader").style.display="none";
                document.getElementById("dashS").style.display="block";
                loadLevel();
            } else { showLogin(); }
        } catch(e) { showLogin(); }
    }

    async function loadLevel() {
        try {
            const r = await fetch(SCRIPT_URL + "?action=getWords");
            let all = await r.json();
            currentLevelWords = all.sort(() => 0.5 - Math.random()).slice(0, 6).map(w => w.toUpperCase());
            render();
        } catch(e) { render(); }
    }

    function render() {
        foundWords = [];
        document.getElementById("balance").innerText = balance;
        document.getElementById("levelDisplay").innerText = currentLevel;
        document.getElementById("teamCommission").innerText = teamComm;
        document.getElementById("hintsList").innerHTML = currentLevelWords.map(w => `<div class="hint-tag" id="hint-${w}">${w}</div>`).join("");
        genGrid();
    }

    function genGrid() {
        const g = document.getElementById("grid"); g.innerHTML = "";
        let matrix = Array(64).fill(null);
        currentLevelWords.forEach(word => {
            let placed = false;
            while (!placed) {
                let isH = Math.random() > 0.5;
                let r = Math.floor(Math.random() * 8), c = Math.floor(Math.random() * (8 - word.length));
                let start = isH ? (r * 8 + c) : (c * 8 + r);
                let can = true;
                for (let i = 0; i < word.length; i++) {
                    let p = isH ? (start + i) : (start + i * 8);
                    if (matrix[p] !== null) { can = false; break; }
                }
                if (can) {
                    for (let i = 0; i < word.length; i++) {
                        let p = isH ? (start + i) : (start + i * 8);
                        matrix[p] = word[i];
                    }
                    placed = true;
                }
            }
        });
        matrix.forEach((char, i) => {
            let d = document.createElement("div");
            d.className = "cell"; d.textContent = char || "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 26)];
            g.appendChild(d);
        });
    }

    // --- سلیکشن کا پتھر پر لکیر لاجک ---
    function startS(e) { 
        isSelecting = true; 
        selectedCells = []; 
        processPoint(e); 
    }
    function moveS(e) { 
        if (isSelecting) processPoint(e); 
    }
    function processPoint(e) {
        let el = document.elementFromPoint(e.clientX, e.clientY);
        if (el && el.classList.contains('cell') && !selectedCells.includes(el)) {
            el.classList.add("active");
            selectedCells.push(el);
        }
    }
    async function endS() {
        if (!isSelecting) return;
        isSelecting = false;
        let word = selectedCells.map(c => c.textContent).join("");
        if (currentLevelWords.includes(word) && !foundWords.includes(word)) {
            foundWords.push(word);
            document.getElementById("hint-" + word).classList.add("done");
            selectedCells.forEach(c => { c.classList.remove("active"); c.classList.add("found"); });
            if (foundWords.length === 6) {
                balance += 40; currentLevel++;
                await sync("levelComplete", 40);
                Swal.fire("Next!", "+40 Coins", "success").then(() => loadLevel());
            }
        } else { selectedCells.forEach(c => c.classList.remove("active")); }
        selectedCells = [];
    }

    function handleAd() {
        window.open(AD_LINK, '_blank');
        Swal.fire({ title: 'Ad Verification', html: 'Claim in <b>30</b>s', timer: 30000, timerProgressBar: true, showConfirmButton: false });
        setTimeout(async () => {
            balance += 40; await sync("adBonus", 40);
            location.reload();
        }, 30500);
    }

    async function sync(act, earn) {
        try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ username: u.id, earned: earn, level: currentLevel, action: act }) }); } catch(e) {}
    }
</script>
</body>
</html>
