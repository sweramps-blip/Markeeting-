
    <!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://pl28713490.effectivegatecpm.com/50/e5/57/50e557cf9cc1005d7bf547336eed1e00.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Power Star | Reward System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #000; --accent: #f59e0b; --p: #f59e0b; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Outfit'; margin: 0; text-align: center; overflow: hidden; }
        #loader { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; }
        #regView { display:none; padding: 100px 20px; }
        .btn-main { width: 90%; padding: 18px; border-radius: 20px; border: none; background: var(--p); font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .stats-header { display: flex; justify-content: space-around; padding: 15px; background: #050505; border-bottom: 1px solid #222; }
        .stat-value { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        #grid { display: grid; gap: 5px; margin: 15px auto; width: 95vw; max-width: 400px; touch-action: none; }
        .cell { aspect-ratio: 1; background: #151515; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: 800; border: 1px solid #222; font-size: 18px; }
        .cell.active { background: var(--accent); color: #000; }
        .cell.found { background: #064e3b; color: var(--success); }
        .hints-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; max-width: 400px; margin: 0 auto; }
        .hint-tag { background: #111; padding: 8px; border-radius: 5px; font-size: 10px; border: 1px solid #333; color: #777; }
        .hint-tag.done { color: var(--success); text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body onmouseup="endSelection()" ontouchend="endSelection()">

<div id="loader"><h2>POWER STAR</h2><p>Synchronizing...</p></div>

<div id="regView">
    <h2 style="color:var(--p)">Enter Approved ID</h2>
    <input type="text" id="loginID" placeholder="ID HERE" style="width:80%; padding:15px; border-radius:10px; border:1px solid #333; background:#111; color:#fff; text-align:center;">
    <button class="btn-main" onclick="onLogin()">Access Game</button>
</div>

<div id="dashS" style="display:none;">
    <div class="stats-header">
        <div><small>COINS</small><span id="balance" class="stat-value">0</span></div>
        <div><small>LEVEL</small><span id="levelDisplay" class="stat-value">1</span></div>
    </div>

    <div id="grid"></div>
    <div class="hints-grid" id="hintsList"></div>
    
    <button class="btn-main" onclick="openDirectLink()" style="background:#fff; color:#000;">Claim Bonus Coins</button>
    <br>
    <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:gray; font-size:11px; margin-top:20px;">Logout</button>
</div>
<script>
    // --- آپ کی گوگل اسکرپٹ کا یو آر ایل ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6qpU1imi9WDIY2Cm3KN4XLz0E6iR2li7CJWBzqIjKJyFtXZ7StDKGnbv4GeTwcp9P/exec"; 
    
    let u = { id: localStorage.getItem('sm_id') };
    let dictionary = [], currentLevelWords = [], isSelecting = false, selectedCells = [], foundWords = [];
    let balance = parseInt(localStorage.getItem('sm_balance')) || 0;
    let currentLevel = parseInt(localStorage.getItem('sm_level')) || 1;
    let totalTeamComm = parseInt(localStorage.getItem('sm_team_comm')) || 0;
    const size = 8;

    // 1. شروعات: آئی ڈی چیک کریں یا لاگ ان دکھائیں
    window.onload = () => { 
        if(!u.id) {
            showLoginView(); 
        } else {
            verifyExistingUser();
        }
    };

    function showLoginView() {
        // یہاں ہم یوزر کو رجسٹریشن/لاگ ان والا انٹرفیس دکھائیں گے
        Swal.fire({
            title: 'Enter Approved ID',
            input: 'text',
            inputPlaceholder: 'Your Secure ID',
            allowOutsideClick: false,
            confirmButtonText: 'Access Game',
            confirmButtonColor: '#f59e0b',
            background: '#121212',
            color: '#fff'
        }).then((result) => {
            if (result.value) {
                u.id = result.value.trim().toUpperCase();
                verifyExistingUser();
            }
        });
    }

    // 2. آئی ڈی رجسٹریشن لاجک (Check ID Action)
    async function verifyExistingUser() {
        try {
            const r = await fetch(SCRIPT_URL + "?action=checkID&id=" + u.id);
            const res = await r.json();
            if(res.status === "Approved") {
                localStorage.setItem('sm_id', u.id);
                loadWordsFromSheet(); // آئی ڈی صحیح ہو تو الفاظ اٹھائیں
            } else {
                Swal.fire("Denied", "ID not found or not approved", "error").then(() => showLoginView());
            }
        } catch(e) {
            Swal.fire("Error", "Connection failed", "error");
        }
    }

    // 3. ورڈ اٹھانے کی سیٹنگ (Get Words Action)
    async function loadWordsFromSheet() {
        try {
            const resp = await fetch(SCRIPT_URL + "?action=getWords");
            dictionary = await resp.json();
            // صرف وہ الفاظ لیں جو 3 سے 6 حرفی ہوں (تاکہ گرڈ میں فٹ آئیں)
            dictionary = dictionary.filter(w => w.length >= 3 && w.length <= 6);
            initLevel();
        } catch (e) {
            console.log("Sheet empty, using backup");
            dictionary = ["GOLD", "STAR", "ELITE", "POWER", "COIN"];
            initLevel();
        }
    }

    // 4. گیم اور کمیشن کی سیٹنگ (POST logic)
    async function levelComplete() {
        balance += 40;
        currentLevel++;
        localStorage.setItem('sm_balance', balance);
        localStorage.setItem('sm_level', currentLevel);
        
        // کمیشن ٹوسٹ دکھائیں
        showCommissionEffect();

        // شیٹ میں ڈیٹا بھیجیں (doPost)
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    username: u.id,
                    earned: 40,
                    level: currentLevel,
                    action: "updateStats"
                })
            });
        } catch(e) { console.log("Sync failed"); }

        Swal.fire("Level Complete!", "+40 Coins added", "success").then(() => initLevel());
    }

    // باقی فنکشنز (generateMatrix, endSelection وغیرہ) وہی رہیں گے جو آپ کے ڈیزائن میں تھے
</script>
    
</body>
</html>
