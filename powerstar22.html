<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Page</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#000;
}

/* ================= Ad Overlay ================= */
#adOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    z-index:9999;
}

#adOverlay iframe{
    width:100%;
    height:100%;
    border:none;
}

/* Close Button */
#closeBtn{
    position:absolute;
    top:20px;
    right:25px;
    background:red;
    color:white;
    padding:15px 30px;
    border-radius:8px;
    font-weight:bold;
    font-size:18px;
    opacity:0.9;
    cursor:not-allowed;
    z-index:10000;
}

/* ================= YouTube Section ================= */
#videoSection{
    display:none;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Responsive 16:9 Player */
.video-container{
    width:90%;
    max-width:900px;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<!-- Ad Section (Full Screen) -->
<div id="adOverlay">
    <div id="closeBtn">Wait 30s</div>
    <iframe src="https://www.effectivegatecpm.com/upkwe9r2?key=75595a960030d604a751407ff4d7266b"></iframe>
</div>

<!-- Centered YouTube Video -->
<div id="videoSection">
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/8gW6Td2384M" allowfullscreen></iframe>
    </div>
</div>

<script>
let seconds = 30;
let closeBtn = document.getElementById("closeBtn");

let timer = setInterval(function(){
    seconds--;
    closeBtn.innerHTML = "Wait " + seconds + "s";

    if(seconds <= 0){
        clearInterval(timer);
        closeBtn.innerHTML = "❌ Close";
        closeBtn.style.cursor = "pointer";

        closeBtn.onclick = function(){
            document.getElementById("adOverlay").style.display = "none";
            document.getElementById("videoSection").style.display = "flex";
        }
    }
},1000);
</script>

</body>
</html>
