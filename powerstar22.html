<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Page</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Video Section */
#videoSection{
    display:none;
    width:100%;
    max-width:800px;  /* Desktop max width */
    aspect-ratio:16/9;
}

/* Ad Overlay */
#adOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#adOverlay iframe{
    width:100%;
    max-width:800px;  /* Desktop max width */
    aspect-ratio:16/9;
    border:none;
}

/* Close Button */
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    background:red;
    color:white;
    padding:15px 30px;
    border-radius:8px;
    font-weight:bold;
    font-size:18px;
    opacity:0.8;
    cursor:not-allowed;
    text-align:center;
    z-index:10000;
}

/* Responsive for small screens */
@media (max-width:600px){
    #videoSection, #adOverlay iframe{
        max-width:100%;
        height:auto;
    }

    #closeBtn{
        padding:12px 20px;
        font-size:16px;
    }
}
</style>
</head>

<body>

<!-- Ad Section -->
<div id="adOverlay">
    <div id="closeBtn">Wait 30s</div>
    <iframe src="https://www.effectivegatecpm.com/upkwe9r2?key=75595a960030d604a751407ff4d7266b"></iframe>
</div>

<!-- YouTube Video -->
<div id="videoSection">
    <iframe src="https://www.youtube.com/embed/8gW6Td2384M" 
    frameborder="0" allowfullscreen></iframe>
</div>

<script>
let seconds = 30;
let closeBtn = document.getElementById("closeBtn");

let timer = setInterval(function(){
    seconds--;
    closeBtn.innerHTML = "Wait " + seconds + "s";

    if(seconds <= 0){
        clearInterval(timer);
        closeBtn.innerHTML = "❌ Close";
        closeBtn.style.cursor = "pointer";
        closeBtn.style.opacity = "1";

        closeBtn.onclick = function(){
            document.getElementById("adOverlay").style.display = "none";
            document.getElementById("videoSection").style.display = "flex";
        }
    }

},1000);
</script>

</body>
</html>
